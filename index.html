<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ferrum | Заявка</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ferrum">
<meta name="theme-color" content="#0f1117">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='1' x2='1' y2='0'%3E%3Cstop offset='0%25' stop-color='%233b82f6'/%3E%3Cstop offset='100%25' stop-color='%2306b6d4'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='%230f1117'/%3E%3Ctext x='32' y='44' text-anchor='middle' font-family='Arial,sans-serif' font-weight='900' font-size='36' fill='url(%23g)'%3EF%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230f1117'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='1' x2='1' y2='0'%3E%3Cstop offset='0%25' stop-color='%233b82f6'/%3E%3Cstop offset='100%25' stop-color='%2306b6d4'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ctext x='90' y='125' text-anchor='middle' font-family='Arial,sans-serif' font-weight='900' font-size='110' fill='url(%23g)'%3EF%3C/text%3E%3C/svg%3E">
<link rel="manifest" href="manifest.json">
<style>
:root {
  --bg: #0f1117;
  --card: #1a1d27;
  --card-order: #1a2332;
  --border: #2a2d3a;
  --text: #e4e4e7;
  --text2: #9ca3af;
  --accent: #3b82f6;
  --green: #22c55e;
  --red: #ef4444;
  --orange: #f59e0b;
  --cyan: #06b6d4;
  --purple: #a855f7;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}

/* Header */
.header {
  position: sticky; top: 0; z-index: 100;
  background: linear-gradient(135deg, #1a1d27 0%, #1e2233 100%);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  backdrop-filter: blur(10px);
}
.header-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.logo {
  font-size: 18px; font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.logo span { font-weight: 400; opacity: 0.7; }
.logo .app-ver {
  font-size: 9px; font-weight: 400;
  -webkit-text-fill-color: var(--text2); opacity: 0.5;
  margin-left: 4px;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.header-dates {
  font-size: 10px; color: var(--text2);
  line-height: 1.6; text-align: right;
  white-space: nowrap;
}
.header-dates .arrow { color: var(--text2); opacity: 0.5; margin: 0 2px; }

/* Summary Cards */
.summary {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  margin-bottom: 10px;
}
.stat {
  background: var(--card);
  border-radius: 10px;
  padding: 8px;
  text-align: center;
}
.stat-val {
  font-size: 16px; font-weight: 700;
  color: var(--accent);
}
.stat-val.green { color: var(--green); }
.stat-val.orange { color: var(--orange); }
.stat-val.cyan { color: var(--cyan); }
.stat-val.purple { color: var(--purple); }
.stat-lbl {
  font-size: 10px; color: var(--text2);
  margin-top: 2px;
}

/* Search */
.search-wrap {
  position: relative;
}
.search {
  width: 100%; padding: 8px 12px 8px 34px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text);
  font-size: 14px; outline: none;
}
.search:focus { border-color: var(--accent); }
.search-icon {
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%); color: var(--text2); font-size: 14px;
}

/* Filters */
.filters {
  display: flex; gap: 6px; padding: 8px 16px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.filters::-webkit-scrollbar { display: none; }
.filter-btn {
  flex-shrink: 0; padding: 6px 14px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; color: var(--text2);
  font-size: 12px; cursor: pointer; white-space: nowrap;
  transition: all 0.2s;
}
.filter-btn.active {
  background: var(--accent); color: #fff;
  border-color: var(--accent);
}

/* Info bar */
.info-bar {
  padding: 4px 16px 8px;
  font-size: 11px; color: var(--text2);
  display: flex; justify-content: space-between;
  align-items: baseline; gap: 8px;
}
#infoWarehouses {
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  min-width: 0; flex: 1; text-align: right;
  cursor: pointer; transition: all 0.2s;
}
#infoWarehouses.expanded {
  white-space: normal; overflow: visible; text-overflow: unset;
}
#infoCount { white-space: nowrap; }

/* Items List */
.list {
  padding: 0 12px 20px;
}

/* Item Card */
.item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 8px;
  overflow: hidden;
  transition: all 0.2s;
}
.item.has-order {
  background: var(--card-order);
  border-color: #2a4060;
}
.item-main {
  padding: 10px 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
}
.item-order-badge {
  min-width: 44px; min-height: 40px;
  border-radius: 10px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700;
  background: #1e293b; color: var(--text2);
  padding: 4px 6px; line-height: 1.1;
}
.item-order-badge .pack-info {
  font-size: 9px; font-weight: 500; opacity: 0.7;
  margin-top: 1px;
}
.item.has-order .item-order-badge {
  background: linear-gradient(135deg, #1e40af, #3b82f6);
  color: #fff;
}
.item-info { flex: 1; min-width: 0; }
.item-name {
  font-size: 13px; font-weight: 500;
  line-height: 1.3;
  overflow: hidden; text-overflow: ellipsis;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
}
.item-art {
  font-size: 11px; color: var(--text2); margin-top: 2px;
}
.item-indicators {
  display: flex; gap: 6px; margin-top: 4px;
}
.ind {
  font-size: 11px; padding: 1px 6px;
  border-radius: 4px; font-weight: 500;
}
.ind-stock { background: #16341c; color: var(--green); }
.ind-low { background: #3b1515; color: var(--red); }
.ind-sales { background: #1a2040; color: var(--accent); }
.ind-yearago { background: #2d1f3d; color: var(--purple); }

/* Expanded detail */
.item-detail {
  display: none;
  padding: 0 12px 10px;
  border-top: 1px solid var(--border);
}
.item.expanded .item-detail { display: block; padding-top: 10px; }

.detail-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.detail-cell {
  background: rgba(255,255,255,0.03);
  border-radius: 8px;
  padding: 6px 8px;
  text-align: center;
}
.detail-cell .val {
  font-size: 15px; font-weight: 600;
}
.detail-cell .lbl {
  font-size: 10px; color: var(--text2); margin-top: 1px;
}
.val-green { color: var(--green); }
.val-red { color: var(--red); }
.val-blue { color: var(--accent); }
.val-orange { color: var(--orange); }
.val-cyan { color: var(--cyan); }
.val-purple { color: var(--purple); }

/* Clickable detail cells */
.detail-cell.clickable {
  cursor: pointer;
  position: relative;
  transition: background 0.2s;
}
.detail-cell.clickable:active {
  background: rgba(59,130,246,0.15);
}
.detail-cell.clickable .lbl::after {
  content: ' \25BE';
  opacity: 0.4;
  font-size: 9px;
}
.detail-cell.clickable.open .lbl::after {
  content: ' \25B4';
}

/* Warehouse breakdown table */
.wh-breakdown {
  display: none;
  margin-top: 6px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 10px;
  animation: fadeIn 0.15s ease;
  overflow-x: auto;
}
.wh-breakdown.open { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
.wh-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.wh-table th {
  font-size: 10px;
  color: var(--accent);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  padding: 3px 3px;
  text-align: right;
  white-space: nowrap;
}
.wh-table th:first-child { text-align: left; width: 99%; }
.wh-table th { cursor: pointer; user-select: none; }
.wh-table th:hover { color: var(--text); }
.wh-table th .sort-arrow { font-size: 8px; margin-left: 2px; opacity: 0.3; }
.wh-table th.sorted .sort-arrow { opacity: 1; color: var(--accent); }
.wh-table td {
  padding: 3px 3px;
  text-align: right;
  font-weight: 600;
  white-space: nowrap;
}
.wh-table td:first-child {
  text-align: left;
  color: var(--text2);
  font-weight: 400;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: none;
  width: 99%;
}
.wh-table tr + tr td { border-top: 1px solid rgba(255,255,255,0.03); }
.wh-table tr.wh-row-zero td { opacity: 0.3; }
.wh-table tr.wh-row-total td {
  border-top: 1px solid var(--border);
  padding-top: 5px;
  font-weight: 700;
}
.wh-table tr.wh-row-off td { opacity: 0.4; }

/* Warehouse row detail panel */
.wh-table tbody tr { cursor: pointer; }
.wh-table tbody tr:not(.wh-row-total):hover td { background: rgba(255,255,255,0.04); }
.wh-detail-panel {
  padding: 10px 12px;
  background: rgba(255,255,255,0.03);
  border-top: 1px solid rgba(255,255,255,0.06);
  animation: fadeIn 0.15s ease;
}
.wh-detail-row {
  display: flex; align-items: flex-start; gap: 8px;
}
.wh-peak-info { flex: 1; min-width: 0; }
.wh-peak-header {
  display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px;
}
.wh-peak-val { font-size: 18px; font-weight: 700; color: #e74c3c; }
.wh-peak-lbl { font-size: 10px; color: var(--text2); }
.wh-peak-list {
  display: flex; flex-direction: column; gap: 2px;
  font-size: 11px; margin-top: 2px;
}
.wh-peak-list .peak-period { color: var(--text); font-weight: 500; line-height: 1.4; }
.wh-peak-list .peak-more {
  color: var(--accent); cursor: pointer; font-weight: 500; font-size: 10px;
}
.wh-peak-list .peak-period.hidden { display: none; }
.wh-peak-nodata { font-size: 11px; color: rgba(255,255,255,0.25); margin-top: 2px; }
.wh-detail-edit {
  display: flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,0.04); border-radius: 8px; padding: 5px 8px;
  flex-shrink: 0; align-self: center;
}
.wh-detail-edit label { font-size: 11px; color: var(--text2); white-space: nowrap; }
.wh-detail-edit input {
  width: 48px; background: rgba(255,255,255,0.08); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text); font-size: 14px; font-weight: 700;
  padding: 4px 6px; text-align: center; outline: none;
}
.wh-detail-edit input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(255,165,0,0.2); }
.wh-detail-edit button {
  background: var(--accent); border: none; color: #fff; border-radius: 4px;
  padding: 4px 10px; font-size: 12px; font-weight: 600; cursor: pointer;
}
.wh-detail-edit button:hover { filter: brightness(1.1); }
.wh-detail-edit .saving-spin { color: var(--accent); font-size: 12px; }

/* Loading */
.loading-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(--text2); font-size: 14px; }

/* Sort indicator */
.sort-active { color: var(--accent) !important; }

/* No results */
.no-results {
  text-align: center; padding: 40px 20px;
  color: var(--text2);
}
.no-results-icon { font-size: 40px; margin-bottom: 10px; }

/* Manual badge */
.manual-badge {
  font-size: 10px; background: #3b2814;
  color: var(--orange); padding: 1px 5px;
  border-radius: 3px; font-weight: 600;
}

/* Editable manual field */
.manual-edit {
  display: flex; align-items: center; gap: 8px;
  margin-top: 8px; padding: 8px;
  background: rgba(245,158,11,0.08);
  border: 1px solid rgba(245,158,11,0.3);
  border-radius: 10px;
}
.manual-pack-hint {
  display: flex; align-items: center; gap: 4px;
  flex: 1; min-width: 0;
}
.pack-icon { font-size: 20px; line-height: 1; }
.pack-text { font-size: 14px; color: var(--text2); font-weight: 600; }
.manual-right {
  display: flex; align-items: center; gap: 6px;
  flex: 0 0 auto;
}
.manual-edit label {
  font-size: 12px; color: var(--orange); font-weight: 600;
  white-space: nowrap;
}
.manual-input {
  width: 70px; padding: 6px 10px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text);
  font-size: 16px; font-weight: 700;
  text-align: center; outline: none;
  -moz-appearance: textfield;
}
.manual-input::-webkit-outer-spin-button,
.manual-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.manual-input:focus { border-color: var(--orange); }
.manual-save {
  padding: 6px 14px;
  background: var(--orange); color: #000;
  border: none; border-radius: 8px;
  font-size: 14px; font-weight: 700;
  cursor: pointer;
}
.manual-save:active { opacity: 0.7; }
.manual-save.saving { animation: pulse 0.5s infinite; }
.manual-clear {
  padding: 6px 10px;
  background: rgba(255,255,255,0.05); color: var(--text2);
  border: 1px solid var(--border); border-radius: 8px;
  font-size: 12px; cursor: pointer;
}

/* Toast */
.toast {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%);
  padding: 10px 20px; border-radius: 10px;
  font-size: 13px; font-weight: 500;
  z-index: 300; opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }
.toast.success { background: #16341c; color: var(--green); border: 1px solid #22c55e40; }
.toast.error { background: #3b1515; color: var(--red); border: 1px solid #ef444440; }

/* Settings Panel — Modal */
.settings-btn {
  background: none; border: 1px solid var(--border);
  color: var(--text2); border-radius: 8px;
  padding: 6px 10px; font-size: 16px; cursor: pointer;
  transition: all 0.2s; line-height: 1;
}
.settings-btn:active { background: var(--accent); color: #fff; border-color: var(--accent); }
.settings-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.settings-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 150;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
  padding: 20px;
}
.settings-overlay.open { display: flex; }

.settings-panel {
  width: 100%; max-width: 420px;
  max-height: 80vh;
  overflow-y: auto;
}
.settings-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
}
.settings-close {
  float: right;
  background: none; border: none;
  color: var(--text2); font-size: 20px;
  cursor: pointer; line-height: 1;
  padding: 0 4px;
}
.settings-close:active { color: var(--text); }
.settings-title {
  font-size: 12px; font-weight: 600;
  color: var(--accent); margin-bottom: 10px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.settings-row {
  display: flex; align-items: center; gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.settings-row:last-child { margin-bottom: 0; }
.settings-pair {
  display: flex; align-items: center; gap: 6px;
  flex: 1; min-width: 0;
}
.settings-label {
  font-size: 12px; color: var(--text2);
  white-space: nowrap;
}
.settings-input {
  width: 60px; flex-shrink: 0;
  padding: 6px 4px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text);
  font-size: 15px; font-weight: 700;
  text-align: center; outline: none;
  -moz-appearance: textfield;
}
.settings-input::-webkit-outer-spin-button,
.settings-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.settings-input:focus { border-color: var(--accent); }
.settings-apply {
  padding: 6px 14px; flex-shrink: 0;
  background: var(--accent); color: #fff;
  border: none; border-radius: 8px;
  font-size: 13px; font-weight: 600;
  cursor: pointer;
}
.settings-apply:active { opacity: 0.7; }
.settings-apply.saving { animation: pulse 0.5s infinite; }

/* Warehouses */
.wh-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5px;
}
@media (max-width: 380px) {
  .wh-grid { grid-template-columns: 1fr; }
}
.wh-item {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 8px;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 11px; color: var(--text2);
  min-width: 0;
}
.wh-item.active {
  background: rgba(59,130,246,0.1);
  border-color: var(--accent);
  color: var(--text);
}
.wh-check {
  width: 18px; height: 18px;
  border-radius: 5px;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 11px; color: transparent;
  transition: all 0.2s;
}
.wh-item.active .wh-check {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.wh-name {
  overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap;
}
.settings-dates {
  font-size: 11px; color: var(--text2);
  margin-top: 4px;
  display: flex; justify-content: space-between;
  gap: 8px;
}
.settings-dates span { white-space: nowrap; }
.settings-toggle {
  display: flex; align-items: center; gap: 8px;
  margin-top: 10px; padding: 6px 0;
  cursor: pointer; font-size: 12px; color: var(--text2);
}
.settings-toggle input[type="checkbox"] {
  width: 16px; height: 16px; accent-color: var(--accent);
  cursor: pointer;
}
.settings-section { margin-top: 12px; }
.settings-recalc {
  margin-top: 10px; width: 100%;
  padding: 10px;
  background: linear-gradient(135deg, #1e40af, #3b82f6);
  color: #fff; border: none; border-radius: 10px;
  font-size: 14px; font-weight: 600;
  cursor: pointer;
}
.settings-recalc:active { opacity: 0.7; }
.settings-recalc.saving { animation: pulse 0.5s infinite; }
.settings-hint {
  font-size: 11px; color: var(--text2);
  margin-top: 6px; text-align: center;
}
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Загрузка данных...</div>
</div>

<div class="header">
  <div class="header-top">
    <div class="logo">Ferrum <span>| Заявка</span> <span class="app-ver">v2.5</span></div>
    <div style="display:flex;gap:8px;align-items:center">
      <div class="header-dates" id="headerDates"></div>
      <button class="settings-btn" id="settingsBtn" onclick="toggleSettings()">&#9881;</button>
    </div>
  </div>
  <div class="summary" id="summary">
    <div class="stat"><div class="stat-val" id="s-items">-</div><div class="stat-lbl">позиций</div></div>
    <div class="stat" onclick="cycleOrderedStat()" style="cursor:pointer"><div class="stat-val green" id="s-ordered">-</div><div class="stat-lbl" id="s-ordered-lbl">к заказу</div></div>
    <div class="stat"><div class="stat-val cyan" id="s-volume">-</div><div class="stat-lbl">м&sup3;</div></div>
    <div class="stat"><div class="stat-val orange" id="s-weight">-</div><div class="stat-lbl">кг</div></div>
    <div class="stat" onclick="togglePriceView()" style="cursor:pointer"><div class="stat-val" id="s-price" style="color:var(--green);font-size:13px">-</div><div class="stat-lbl" id="s-price-lbl">&#8381; скидка</div></div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">&#128269;</span>
    <input type="text" class="search" id="search" placeholder="Поиск по названию или артикулу..." oninput="applyFilters()">
  </div>
</div>

<div class="settings-overlay" id="settingsOverlay" onclick="if(event.target===this)toggleSettings()">
  <div class="settings-panel">
    <div class="settings-card">
      <button class="settings-close" onclick="toggleSettings()">&times;</button>
      <div class="settings-title">Параметры продаж</div>
      <div class="settings-row" style="justify-content:space-between;align-items:center;gap:6px">
        <div class="settings-pair" style="flex:0 0 auto">
          <input type="number" class="settings-input" id="inp-daysBack" value="-" min="1" max="730" oninput="updateDateHints()" style="width:55px">
          <span class="settings-label">Назад</span>
        </div>
        <div style="text-align:center;flex:0 0 auto">
          <div style="font-size:18px;font-weight:700;color:var(--cyan)" id="settings-vol-display">—</div>
          <div style="font-size:10px;color:var(--text2)">м³</div>
        </div>
        <div class="settings-pair" style="flex:0 0 auto">
          <span class="settings-label">Вперёд</span>
          <input type="number" class="settings-input" id="inp-daysForward" value="-" min="1" max="365" oninput="updateDateHints()">
        </div>
      </div>
      <div class="settings-dates" id="dateHints"></div>

      <div class="settings-section">
        <div class="settings-title">Склады</div>
        <div class="wh-grid" id="whGrid"></div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 12px">
        <label class="settings-toggle">
          <input type="checkbox" id="hideEmptyWh" onchange="hideEmptyWhChanged()">
          Скрывать пустые склады
        </label>
        <label class="settings-toggle">
          <input type="checkbox" id="hideUnselectedWh" onchange="hideUnselectedWhChanged()">
          Скрывать невыбранные склады
        </label>
      </div>

      <div style="display:flex;gap:12px;align-items:flex-start">
        <div class="settings-section" style="flex:1">
          <div class="settings-title">Скидка</div>
          <div class="settings-row">
            <div class="settings-pair">
              <span class="settings-label">от РРЦ</span>
              <input type="number" class="settings-input" id="inp-discount" value="42" min="0" max="100" oninput="updateDiscount()">
              <span class="settings-label">%</span>
            </div>
          </div>
        </div>
        <div class="settings-section" style="flex:0 0 auto;text-align:right">
          <div class="settings-title">Цель</div>
          <div class="settings-row" style="justify-content:flex-end">
            <div class="settings-pair">
              <span class="settings-label">Объём</span>
              <input type="number" class="settings-input" id="inp-targetVolume" value="" min="1" placeholder="—" style="width:55px" title="Целевой объём заявки">
              <span class="settings-label">м³</span>
            </div>
          </div>
        </div>
      </div>

      <button class="settings-recalc" id="recalcBtn" onclick="recalculate()">Пересчитать заявку</button>
      <div class="settings-hint">После изменения параметров или складов нажмите «Пересчитать»</div>

      <div class="settings-section">
        <div class="settings-title">Пики продаж</div>
        <div class="settings-row" style="justify-content:space-between">
          <div class="settings-pair" style="flex:0 0 auto">
            <span class="settings-label">Окно (дн.)</span>
            <input type="number" class="settings-input" id="inp-peakDays" value="14" min="1" max="90">
          </div>
          <div class="settings-pair" style="flex:0 0 auto">
            <span class="settings-label">Начало</span>
            <input type="date" class="settings-input" id="inp-peakDateFrom" style="width:130px">
          </div>
        </div>
        <div class="settings-dates" id="peakInfo"></div>
        <button class="settings-recalc" id="recalcPeaksBtn" onclick="recalcPeaks()" style="background:linear-gradient(135deg,#c0392b,#e74c3c)">Пересчитать пики (~2-3 мин)</button>
      </div>
    </div>
  </div>
</div>

<div class="filters" id="filtersBar">
  <button class="filter-btn active" data-filter="all" onclick="setFilter(this)">Все</button>
  <button class="filter-btn" data-filter="ordered" onclick="setFilter(this)">К заказу</button>
  <button class="filter-btn" data-filter="manual" onclick="setFilter(this)">Ручные</button>
  <button class="filter-btn" data-filter="low" onclick="setFilter(this)">Дефицит</button>
  <button class="filter-btn" data-filter="surplus" onclick="setFilter(this)">Излишки</button>
</div>

<div class="info-bar">
  <span id="infoCount">-</span>
  <span id="infoWarehouses" onclick="this.classList.toggle('expanded')">-</span>
</div>

<div class="list" id="list"></div>
<div class="toast" id="toast"></div>


<script>
// === CONFIG ===
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbw2L0h69wYtIrdpGt6VlfbzKQhjsh0fx_KKIGU7hkOafBC7aNh0Hg0GkhkmF6TMnuK1jw/exec';
const SHEET_ID = '1ETqyDhB5Uh4tcmCX8uidtyNhleMSGIjRZ9snOacO-Gk';

let allData = [];
let filteredData = [];
let currentFilter = 'all';
let params = {};
let discount = 42; // скидка от РРЦ в %
let showDiscounted = true; // true = со скидкой, false = РРЦ
let orderedStatMode = 0; // 0 = позиций, 1 = штук, 2 = коробок

// === LOAD DATA ===
async function loadData() {

  try {
    let data;

    // Try Web App first
    if (WEBAPP_URL) {
      const resp = await fetch(WEBAPP_URL + '?action=order');
      data = await resp.json();
    } else {
      // Try local data.json (for preview / local use)
      try {
        const localResp = await fetch('./data.json');
        if (localResp.ok) {
          data = await localResp.json();
        }
      } catch(e) {}

      // If no local data, try Google Visualization API
      if (!data) {
        data = await loadFromGViz();
      }
    }

    if (data && data.rows) {
      allData = data.rows;
      params = data.params || {};
      discount = params.discount || 42;
      renderAll();
      renderSettings();
      updateHeaderDates();
    }
  } catch (err) {
    console.error('Load error:', err);
    document.getElementById('list').innerHTML =
      '<div class="no-results"><div class="no-results-icon">&#9888;</div>Ошибка загрузки данных<br><small style="color:#666">Проверьте доступ к таблице</small></div>';
  }

  document.getElementById('loading').style.display = 'none';
}

// === Load from Google Visualization API ===
async function loadFromGViz() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=%D0%97%D0%B0%D1%8F%D0%B2%D0%BA%D0%B0`;
  const resp = await fetch(url);
  let text = await resp.text();
  // Strip JSONP wrapper: "google.visualization.Query.setResponse({...})"
  text = text.replace(/^[^(]*\(/, '').replace(/\);?\s*$/, '');
  const json = JSON.parse(text);

  const rows = [];
  const table = json.table;
  for (let i = 1; i < table.rows.length; i++) {
    const r = table.rows[i];
    const c = r.c;
    if (!c[0] || !c[0].v) continue;
    rows.push({
      name: c[0] ? c[0].v : '',
      art: c[1] ? c[1].v : '',
      stock: c[2] ? (c[2].v || 0) : 0,
      minStock: c[3] ? (c[3].v || 0) : 0,
      sales: c[4] ? (c[4].v || 0) : 0,
      yearAgo: c[5] ? (c[5].v || 0) : 0,
      order: c[6] ? (c[6].v || 0) : 0,
      volume: c[7] ? (c[7].v || 0) : 0,
      weight: c[8] ? (c[8].v || 0) : 0,
      price: c[9] ? (c[9].v || 0) : 0,
      manual: c[10] ? c[10].v : null,
      packSize: 1
    });
  }

  // Also load params
  const purl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=%D0%9F%D0%B0%D1%80%D0%B0%D0%BC%D0%B5%D1%82%D1%80%D1%8B`;
  try {
    const presp = await fetch(purl);
    let ptext = await presp.text();
    ptext = ptext.replace(/^[^(]*\(/, '').replace(/\);?\s*$/, '');
    const pjson = JSON.parse(ptext);
    const pt = pjson.table;

    const wh = [];
    for (let i = 1; i <= 10; i++) {
      if (pt.rows[i] && pt.rows[i].c[4] && pt.rows[i].c[4].v === true) {
        wh.push(pt.rows[i].c[3] ? pt.rows[i].c[3].v : '');
      }
    }
    return {
      rows: rows,
      params: {
        warehouses: wh,
        salesDaysBack: pt.rows[13] && pt.rows[13].c[1] ? pt.rows[13].c[1].v : '',
        balanceDate: pt.rows[11] && pt.rows[11].c[1] ? (pt.rows[11].c[1].f || pt.rows[11].c[1].v) : '',
        totalRows: pt.rows[6] && pt.rows[6].c[1] ? pt.rows[6].c[1].v : ''
      }
    };
  } catch(e) {
    return { rows: rows, params: { warehouses: [] } };
  }
}

// === RENDER ===
function renderAll() {
  applyFilters();
  updateSummary();
}

function updateSummary() {
  const ordered = allData.filter(r => r.order > 0);
  document.getElementById('s-items').textContent = allData.length;
  updateOrderedStat();

  const totVol = ordered.reduce((s, r) => s + (r.volume || 0), 0);
  const totWt = ordered.reduce((s, r) => s + (r.weight || 0), 0);
  const totPrice = ordered.reduce((s, r) => s + (r.price || 0), 0);
  const discountedPrice = Math.round(totPrice * (1 - discount / 100));
  document.getElementById('s-volume').textContent = totVol.toFixed(1);
  document.getElementById('s-weight').textContent = Math.round(totWt);
  const volDisp = document.getElementById('settings-vol-display');
  if (volDisp) volDisp.textContent = totVol.toFixed(1);
  if (showDiscounted) {
    document.getElementById('s-price').textContent = discountedPrice.toLocaleString('ru-RU');
    document.getElementById('s-price-lbl').innerHTML = '&#8381; -' + discount + '%';
  } else {
    document.getElementById('s-price').textContent = totPrice.toLocaleString('ru-RU');
    document.getElementById('s-price-lbl').innerHTML = '&#8381; РРЦ';
  }

  if (params.warehouses && params.warehouses.length > 0) {
    document.getElementById('infoWarehouses').textContent = params.warehouses.join(', ');
  }
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();

  filteredData = allData.filter(r => {
    // Search
    if (q && !r.name.toLowerCase().includes(q) && !r.art.toLowerCase().includes(q)) return false;

    // Filter
    switch (currentFilter) {
      case 'ordered': return r.order > 0;
      case 'manual': return r.manual !== null && r.manual !== undefined && r.manual !== '';
      case 'low': return r.stock < r.minStock;
      case 'surplus': return r.stock > r.minStock * 2 && r.minStock > 0;
      default: return true;
    }
  });

  document.getElementById('infoCount').textContent =
    `${filteredData.length} из ${allData.length} позиций`;

  renderList();
}

function setFilter(el) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentFilter = el.dataset.filter;
  applyFilters();
}

function renderList() {
  const container = document.getElementById('list');
  if (filteredData.length === 0) {
    container.innerHTML = '<div class="no-results"><div class="no-results-icon">&#128270;</div>Ничего не найдено</div>';
    return;
  }

  let html = '';
  for (let i = 0; i < filteredData.length; i++) {
    const r = filteredData[i];
    const hasOrder = r.order > 0;
    const isLow = r.stock < r.minStock;
    const hasManual = r.manual !== null && r.manual !== undefined && r.manual !== '';

    // Short name: remove "Ф " prefix and clean up
    const shortName = r.name.replace(/^Ф\s+/, '');

    const globalIdx = allData.indexOf(r);
    const manualVal = hasManual ? r.manual : '';

    html += `<div class="item ${hasOrder ? 'has-order' : ''}" id="item-${i}" onclick="toggleItem(${i}, event)">
      <div class="item-main">
        <div class="item-order-badge" id="badge-${i}">${hasOrder ? r.order : '0'}${r.packSize > 1 ? `<span class="pack-info">${Math.floor(r.order / r.packSize)}×${r.packSize}</span>` : ''}</div>
        <div class="item-info">
          <div class="item-name">${shortName}</div>
          <div class="item-art">${r.art}${hasManual ? ' <span class="manual-badge">РУЧН.</span>' : ''}</div>
          <div class="item-indicators">
            <span class="ind ${isLow ? 'ind-low' : 'ind-stock'}">${isLow ? '&#9660;' : '&#9650;'} ${r.stock}/${r.minStock}</span>
            <span class="ind ind-sales">&#8594; ${r.sales}</span>
            ${r.yearAgo > 0 ? `<span class="ind ind-yearago">&#8635; ${r.yearAgo}</span>` : ''}
          </div>
        </div>
      </div>
      <div class="item-detail">
        <div class="detail-grid">
          <div class="detail-cell clickable" onclick="event.stopPropagation(); toggleBreakdown(${i})"><div class="val val-blue">${r.sales}</div><div class="lbl">Продажи</div></div>
          <div class="detail-cell"><div class="val val-purple">${r.yearAgo}</div><div class="lbl">Год назад</div></div>
          <div class="detail-cell clickable" id="dc-wh-${i}" onclick="event.stopPropagation(); toggleBreakdown(${i})"><div class="val ${isLow ? 'val-red' : 'val-green'}">${r.stock}</div><div class="lbl">Остаток</div></div>
          <div class="detail-cell clickable" onclick="event.stopPropagation(); toggleBreakdown(${i})"><div class="val val-orange">${r.minStock}</div><div class="lbl">Мин. ост.</div></div>
          <div class="detail-cell"><div class="val" style="color:#fff;font-size:18px;font-weight:800" id="order-${i}">${r.order}</div><div class="lbl">Заказ</div></div>
          <div class="detail-cell"><div class="val" style="color:var(--text2)" id="wt-${i}">${r.weight ? r.weight.toFixed(1) : '0'}</div><div class="lbl">Вес кг</div></div>
          <div class="detail-cell"><div class="val" style="color:var(--text2)" id="vol-${i}">${r.volume ? r.volume.toFixed(3) : '0'}</div><div class="lbl">Объем м&sup3;</div></div>
          <div class="detail-cell" style="cursor:pointer" onclick="event.stopPropagation(); toggleCardPrice(${i})"><div class="val val-green" id="prc-${i}">${r.price ? (showDiscounted ? Math.round(r.price * (1 - discount / 100)).toLocaleString('ru-RU') : r.price.toLocaleString('ru-RU')) : '0'}</div><div class="lbl" id="prc-lbl-${i}">${showDiscounted ? '-' + discount + '%' : 'РРЦ'}</div></div>
        </div>
        <div class="wh-breakdown" id="whbd-${i}"></div>
        <div class="manual-edit">
          <div class="manual-pack-hint" onclick="event.stopPropagation()">
            <span class="pack-icon">📦</span>
            <span class="pack-text">×${r.packSize || 1}</span>
          </div>
          <div class="manual-right">
            <label>Ручн:</label>
            <input type="number" class="manual-input" id="manual-${i}" value="${manualVal}" placeholder="-" data-art="${r.art}" data-idx="${globalIdx}" onclick="event.stopPropagation()">
            <button class="manual-save" id="savebtn-${i}" onclick="event.stopPropagation(); saveManual(${i})">OK</button>
            <button class="manual-clear" onclick="event.stopPropagation(); clearManual(${i})">X</button>
          </div>
        </div>
      </div>
    </div>`;
  }
  container.innerHTML = html;
}

function toggleItem(index, event) {
  // Don't toggle if clicking on input/button inside manual-edit or clickable detail cells
  if (event && event.target.closest && event.target.closest('.manual-edit')) return;
  if (event && event.target.closest && event.target.closest('.detail-cell.clickable')) return;
  if (event && event.target.closest && event.target.closest('.wh-breakdown')) return;
  const el = document.getElementById('item-' + index);
  el.classList.toggle('expanded');
  // Close breakdown when collapsing
  if (!el.classList.contains('expanded')) {
    const bd = document.getElementById('whbd-' + index);
    if (bd) { bd.classList.remove('open'); bd.innerHTML = ''; }
    document.querySelectorAll('#item-' + index + ' .detail-cell.clickable').forEach(function(c) { c.classList.remove('open'); });
  }
}

// Persistent sort state for warehouse breakdown table
let whSortCol = null;  // 'name', 'stock', 'min', 'sales'
let whSortAsc = true;

function toggleBreakdown(i) {
  const bd = document.getElementById('whbd-' + i);
  const r = filteredData[i];
  if (!r) return;

  // Toggle off/on
  if (bd.classList.contains('open')) {
    bd.classList.remove('open');
    bd.innerHTML = '';
    document.querySelectorAll('#item-' + i + ' .detail-cell.clickable').forEach(function(c) { c.classList.remove('open'); });
    return;
  }

  document.querySelectorAll('#item-' + i + ' .detail-cell.clickable').forEach(function(c) { c.classList.add('open'); });
  renderBreakdown(i);
}

function sortBreakdownCol(i, col) {
  if (whSortCol === col) {
    whSortAsc = !whSortAsc;
  } else {
    whSortCol = col;
    whSortAsc = col === 'name'; // A-Z for name, desc for numbers
  }
  renderBreakdown(i);
}

function renderBreakdown(i) {
  const bd = document.getElementById('whbd-' + i);
  const r = filteredData[i];
  if (!r) return;

  const warehouses = params.warehouses || [];
  const stockData = r.stockByWh || {};
  const minData = r.minByWh || {};
  const salesData = r.salesByWh || {};
  const peakData = r.peaksByWh || {};

  // Build rows for active warehouses
  let rows = warehouses.map(function(wh) {
    const pk = peakData[wh] || {};
    return { name: wh, stock: stockData[wh] || 0, min: minData[wh] || 0, sales: salesData[wh] || 0, peak: pk.m || (typeof pk === 'number' ? pk : 0), peakPeriods: pk.p || '', peakTotal: pk.t || 0, off: false };
  });

  // Add inactive warehouses with data
  const allWh = params.allWarehouses || [];
  allWh.forEach(function(w) {
    if (!w.active && (stockData[w.name] || minData[w.name] || salesData[w.name])) {
      const pk = peakData[w.name] || {};
      rows.push({ name: w.name, stock: stockData[w.name] || 0, min: minData[w.name] || 0, sales: salesData[w.name] || 0, peak: pk.m || (typeof pk === 'number' ? pk : 0), peakPeriods: pk.p || '', peakTotal: pk.t || 0, off: true });
    }
  });

  // Sort if active
  if (whSortCol) {
    rows.sort(function(a, b) {
      let va, vb;
      if (whSortCol === 'name') {
        va = a.name.toLowerCase(); vb = b.name.toLowerCase();
        return whSortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
      }
      va = a[whSortCol]; vb = b[whSortCol];
      return whSortAsc ? va - vb : vb - va;
    });
  }

  let totStock = 0, totMin = 0, totSales = 0;

  function thClass(col) { return whSortCol === col ? ' sorted' : ''; }
  function arrow(col) {
    if (whSortCol !== col) return '<span class="sort-arrow">\u25B2</span>';
    return '<span class="sort-arrow">' + (whSortAsc ? '\u25B2' : '\u25BC') + '</span>';
  }

  let html = '<table class="wh-table"><thead><tr>' +
    '<th class="' + thClass('name') + '" onclick="event.stopPropagation(); sortBreakdownCol(' + i + ',\'name\')">Склад' + arrow('name') + '</th>' +
    '<th class="' + thClass('sales') + '" onclick="event.stopPropagation(); sortBreakdownCol(' + i + ',\'sales\')">Прод.' + arrow('sales') + '</th>' +
    '<th class="' + thClass('stock') + '" onclick="event.stopPropagation(); sortBreakdownCol(' + i + ',\'stock\')">Ост.' + arrow('stock') + '</th>' +
    '<th class="' + thClass('min') + '" onclick="event.stopPropagation(); sortBreakdownCol(' + i + ',\'min\')">Мин.' + arrow('min') + '</th>' +
    '</tr></thead><tbody>';

  rows.forEach(function(row, rowIdx) {
    const allZero = row.stock === 0 && row.min === 0 && row.sales === 0;
    if (hideEmptyWarehouses && allZero && !row.off) return;
    if (hideUnselectedWarehouses && row.off) return;
    totStock += row.stock; totMin += row.min; totSales += row.sales;
    const cls = row.off ? 'wh-row-off' : (allZero ? 'wh-row-zero' : '');
    const whEsc = row.name.replace(/'/g, "\\'");
    html += '<tr class="' + cls + '" onclick="event.stopPropagation(); toggleWhDetail(' + i + ', \'' + whEsc + '\', this)">' +
      '<td>' + row.name + (row.off ? ' (выкл)' : '') + '</td>' +
      '<td class="val-blue">' + row.sales + '</td>' +
      '<td class="val-green">' + row.stock + '</td>' +
      '<td class="val-orange">' + row.min + '</td>' +
      '</tr>';
  });

  html += '<tr class="wh-row-total">' +
    '<td>Итого</td>' +
    '<td class="val-blue">' + totSales + '</td>' +
    '<td class="val-green">' + totStock + '</td>' +
    '<td class="val-orange">' + totMin + '</td>' +
    '</tr>';

  html += '</tbody></table>';

  bd.innerHTML = html;
  bd.classList.add('open');
}

// === WAREHOUSE ROW DETAIL PANEL ===
let activeWhDetail = null; // track open detail row

function toggleWhDetail(itemIdx, whName, trEl) {
  // If already open for this warehouse — close it
  const existingPanel = trEl.nextElementSibling;
  if (existingPanel && existingPanel.classList.contains('wh-detail-tr')) {
    existingPanel.remove();
    activeWhDetail = null;
    return;
  }
  // Close any existing panel
  if (activeWhDetail) { activeWhDetail.remove(); activeWhDetail = null; }

  const r = filteredData[itemIdx];
  if (!r) return;

  const min = (r.minByWh || {})[whName] || 0;
  const peakObj = (r.peaksByWh || {})[whName] || {};
  const peak = peakObj.m || (typeof peakObj === 'number' ? peakObj : 0);
  const peakPeriods = peakObj.p || '';
  const peakTotal = peakObj.t || 0;
  const peakDays = params.peakDaysWindow || 14;

  const whEsc = whName.replace(/'/g, "\\'");

  // Build peak info section
  let peakHtml = '<div class="wh-peak-info">';
  peakHtml += '<div class="wh-peak-header"><span class="wh-peak-val">' + peak + '</span><span class="wh-peak-lbl">пик (' + peakDays + 'д)</span></div>';
  if (peakPeriods) {
    const parts = peakPeriods.split(' / ');
    const maxShow = 4;
    const uid = 'pk-' + itemIdx + '-' + Date.now();
    peakHtml += '<div class="wh-peak-list" id="' + uid + '">';
    parts.forEach(function(p, idx) {
      if (idx < maxShow) {
        peakHtml += '<div class="peak-period">' + p + '</div>';
      } else {
        peakHtml += '<div class="peak-period hidden" data-extra="' + uid + '">' + p + '</div>';
      }
    });
    if (parts.length > maxShow) {
      peakHtml += '<div class="peak-more" onclick="event.stopPropagation(); expandPeaks(\'' + uid + '\', this)">(+' + (parts.length - maxShow) + ' ещё)</div>';
    }
    peakHtml += '</div>';
  } else {
    peakHtml += '<div class="wh-peak-nodata">нет данных — пересчитайте пики</div>';
  }
  peakHtml += '</div>';

  const panelHtml =
    '<td colspan="4"><div class="wh-detail-panel" onclick="event.stopPropagation()">' +
      '<div class="wh-detail-row">' +
        peakHtml +
        '<div class="wh-detail-edit">' +
          '<label>Мин:</label>' +
          '<input type="number" value="' + min + '" id="wh-min-inp-' + itemIdx + '" readonly onclick="this.removeAttribute(\'readonly\'); this.focus(); this.select();">' +
          '<button onclick="saveMinStock(' + itemIdx + ', \'' + whEsc + '\')">OK</button>' +
        '</div>' +
      '</div>' +
    '</div></td>';

  const detailTr = document.createElement('tr');
  detailTr.className = 'wh-detail-tr';
  detailTr.innerHTML = panelHtml;
  trEl.after(detailTr);
  activeWhDetail = detailTr;

  const inp = detailTr.querySelector('input');
  inp.addEventListener('keydown', function(ev) {
    ev.stopPropagation();
    if (ev.key === 'Enter') saveMinStock(itemIdx, whName);
    if (ev.key === 'Escape') { detailTr.remove(); activeWhDetail = null; }
  });
}

async function saveMinStock(itemIdx, whName) {
  const inp = document.getElementById('wh-min-inp-' + itemIdx);
  if (!inp) return;
  const newVal = parseInt(inp.value) || 0;
  const r = filteredData[itemIdx];
  if (!r) return;

  const editDiv = inp.closest('.wh-detail-edit');
  editDiv.innerHTML = '<span class="saving-spin">Сохранение...</span>';

  try {
    const resp = await fetch(WEBAPP_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'setMinStock', art: r.art, warehouse: whName, value: newVal }),
      redirect: 'follow'
    });

    let result;
    try { result = await resp.json(); } catch(e) { result = null; }

    if (result && result.ok) {
      if (!r.minByWh) r.minByWh = {};
      r.minByWh[whName] = newVal;
      const warehouses = params.warehouses || [];
      let totalMin = 0;
      warehouses.forEach(function(wh) { totalMin += (r.minByWh[wh] || 0); });
      r.minStock = totalMin;
      const globalIdx = allData.indexOf(r);
      if (globalIdx >= 0) { allData[globalIdx].minStock = totalMin; allData[globalIdx].minByWh = r.minByWh; }

      activeWhDetail = null;
      renderAll();
      showToast('Мин. остаток ' + whName + ': ' + newVal, 'success');
    } else {
      showToast('Ошибка: ' + (result && result.error || 'нет ответа'), 'error');
      if (activeWhDetail) { activeWhDetail.remove(); activeWhDetail = null; }
    }
  } catch (err) {
    console.error('Save min stock error:', err);
    showToast('Ошибка сохранения', 'error');
    if (activeWhDetail) { activeWhDetail.remove(); activeWhDetail = null; }
  }
}

// === MANUAL EDIT ===
async function saveManual(i) {
  const input = document.getElementById('manual-' + i);
  const btn = document.getElementById('savebtn-' + i);
  const art = input.dataset.art;
  const globalIdx = parseInt(input.dataset.idx);
  const value = input.value.trim();

  if (value === '' || isNaN(Number(value))) {
    showToast('Введите число', 'error');
    return;
  }

  btn.classList.add('saving');
  btn.textContent = '...';

  try {
    const resp = await fetch(WEBAPP_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'setManual', art: art, value: Number(value) }),
      redirect: 'follow'
    });

    let result;
    try { result = await resp.json(); } catch(e) { result = null; }

    if (result && result.ok && result.row) {
      // Update local data with recalculated values from server
      allData[globalIdx].manual = result.row.manual;
      allData[globalIdx].order = result.row.order;
      allData[globalIdx].volume = result.row.volume;
      allData[globalIdx].weight = result.row.weight;
      allData[globalIdx].price = result.row.price;
      showToast('Сохранено: ' + art + ' = ' + value, 'success');
      renderAll();
    } else {
      // Optimistic update if response unreadable
      allData[globalIdx].manual = Number(value);
      showToast('Отправлено: ' + art + ' = ' + value, 'success');
      setTimeout(() => loadData(), 2000);
    }
  } catch (err) {
    console.error('Save error:', err);
    showToast('Ошибка сохранения', 'error');
  }

  btn.classList.remove('saving');
  btn.textContent = 'OK';
}

async function clearManual(i) {
  const input = document.getElementById('manual-' + i);
  const art = input.dataset.art;
  const globalIdx = parseInt(input.dataset.idx);

  try {
    const resp = await fetch(WEBAPP_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'setManual', art: art, value: '' }),
      redirect: 'follow'
    });

    let result;
    try { result = await resp.json(); } catch(e) { result = null; }

    if (result && result.ok && result.row) {
      allData[globalIdx].manual = null;
      allData[globalIdx].order = result.row.order;
      allData[globalIdx].volume = result.row.volume;
      allData[globalIdx].weight = result.row.weight;
      allData[globalIdx].price = result.row.price;
      input.value = '';
      showToast('Очищено: ' + art, 'success');
      renderAll();
    } else {
      allData[globalIdx].manual = null;
      input.value = '';
      showToast('Очищено: ' + art, 'success');
      setTimeout(() => loadData(), 2000);
    }
  } catch (err) {
    console.error('Clear error:', err);
    showToast('Ошибка очистки', 'error');
  }
}

function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast ' + type + ' show';
  setTimeout(() => { toast.classList.remove('show'); }, 2500);
}

// === SETTINGS ===
let hideEmptyWarehouses = false;
let hideUnselectedWarehouses = false;

function toggleSettings() {
  const overlay = document.getElementById('settingsOverlay');
  const btn = document.getElementById('settingsBtn');
  overlay.classList.toggle('open');
  btn.classList.toggle('active');
}

function hideEmptyWhChanged() {
  hideEmptyWarehouses = document.getElementById('hideEmptyWh').checked;
}

function hideUnselectedWhChanged() {
  hideUnselectedWarehouses = document.getElementById('hideUnselectedWh').checked;
}

function expandPeaks(uid, el) {
  document.querySelectorAll('[data-extra="' + uid + '"]').forEach(function(p) { p.classList.remove('hidden'); });
  el.remove();
}

function toggleCardPrice(i) {
  const r = filteredData[i];
  if (!r || !r.price) return;
  const valEl = document.getElementById('prc-' + i);
  const lblEl = document.getElementById('prc-lbl-' + i);
  if (!valEl || !lblEl) return;

function updateDiscount() {
  discount = parseInt(document.getElementById('inp-discount').value) || 0;
  updateSummary();
}

function cycleOrderedStat() {
  orderedStatMode = (orderedStatMode + 1) % 3;
  updateOrderedStat();
}

function updateOrderedStat() {
  const ordered = allData.filter(r => r.order > 0);
  const el = document.getElementById('s-ordered');
  const lbl = document.getElementById('s-ordered-lbl');
  if (orderedStatMode === 0) {
    el.textContent = ordered.length;
    lbl.textContent = 'к заказу';
  } else if (orderedStatMode === 1) {
    const totalPcs = ordered.reduce((s, r) => s + (r.order || 0), 0);
    el.textContent = totalPcs.toLocaleString('ru-RU');
    lbl.textContent = 'штук';
  } else {
    const totalBoxes = ordered.reduce((s, r) => s + (r.packSize > 1 ? Math.floor(r.order / r.packSize) : r.order), 0);
    el.textContent = totalBoxes.toLocaleString('ru-RU');
    lbl.textContent = 'коробок';
  }
}

function togglePriceView() {
  showDiscounted = !showDiscounted;
  updateSummary();
}

function updateHeaderDates() {
  updateDateHints();
}

function formatDate(d) {
  return String(d.getDate()).padStart(2,'0') + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + d.getFullYear();
}

function parseDateDMY(s) {
  if (!s) return null;
  const m = s.match(/^(\d{2})\.(\d{2})\.(\d{4})$/);
  if (!m) return null;
  return new Date(parseInt(m[3]), parseInt(m[2]) - 1, parseInt(m[1]));
}

function parseServerDate(val) {
  if (!val) return '';
  if (typeof val === 'string' && val.match(/^\d{2}\.\d{2}\.\d{4}$/)) return val;
  const d = new Date(val);
  if (isNaN(d.getTime())) return String(val);
  return formatDate(d);
}

function updateDateHints() {
  const back = parseInt(document.getElementById('inp-daysBack').value) || 0;
  const fwd = parseInt(document.getElementById('inp-daysForward').value) || 0;

  // Опорная дата — salesBackTo (последняя дата данных) или сегодня
  let anchor;
  if (params.salesBackTo) {
    const parsed = parseDateDMY(parseServerDate(params.salesBackTo));
    anchor = parsed || new Date();
  } else {
    anchor = new Date();
  }

  const backFrom = new Date(anchor); backFrom.setDate(backFrom.getDate() - back);
  const backTo = anchor;
  // Год назад от опорной даты
  const fwdAnchor = new Date(anchor); fwdAnchor.setFullYear(fwdAnchor.getFullYear() - 1);
  const fwdFrom = fwdAnchor;
  const fwdTo = new Date(fwdAnchor); fwdTo.setDate(fwdTo.getDate() + fwd);

  document.getElementById('dateHints').innerHTML =
    '<span>' + formatDate(backFrom) + ' — ' + formatDate(backTo) + '</span>' +
    '<span>' + formatDate(fwdFrom) + ' — ' + formatDate(fwdTo) + '</span>';

  // Обновляем шапку тоже
  document.getElementById('headerDates').innerHTML =
    formatDate(backFrom) + ' <span class="arrow">→</span> ' + formatDate(backTo) +
    '<br>' + formatDate(fwdFrom) + ' <span class="arrow">→</span> ' + formatDate(fwdTo);
}

function renderSettings() {
  // Days inputs
  document.getElementById('inp-daysBack').value = params.salesDaysBack || '';
  document.getElementById('inp-daysForward').value = params.salesDaysForward || '';

  // Warehouses
  const grid = document.getElementById('whGrid');
  const allWh = params.allWarehouses || [];
  if (allWh.length === 0) {
    grid.innerHTML = '<div style="color:var(--text2);font-size:12px;grid-column:1/-1">Данные о складах недоступны</div>';
    return;
  }
  let html = '';
  for (let w = 0; w < allWh.length; w++) {
    const wh = allWh[w];
    html += `<div class="wh-item ${wh.active ? 'active' : ''}" data-row="${wh.row}" data-idx="${w}" onclick="toggleWarehouse(this)">
      <div class="wh-check">${wh.active ? '&#10003;' : ''}</div>
      <div class="wh-name">${wh.name}</div>
    </div>`;
  }
  grid.innerHTML = html;
  document.getElementById('inp-discount').value = discount;
  // Peak params
  document.getElementById('inp-peakDays').value = params.peakDaysWindow || 14;
  if (params.dateFrom) {
    const df = new Date(params.dateFrom);
    document.getElementById('inp-peakDateFrom').value = df.getFullYear() + '-' + String(df.getMonth()+1).padStart(2,'0') + '-' + String(df.getDate()).padStart(2,'0');
  }
  const peakInfo = document.getElementById('peakInfo');
  if (params.dateTo) {
    peakInfo.innerHTML = 'Конец периода: ' + formatDate(new Date(params.dateTo)) + ' (сегодня)';
  }
  updateDateHints();
}

function toggleWarehouse(el) {
  el.classList.toggle('active');
  const isActive = el.classList.contains('active');
  el.querySelector('.wh-check').innerHTML = isActive ? '&#10003;' : '';
}

async function applyParams() {
  const daysBack = document.getElementById('inp-daysBack').value.trim();
  const daysForward = document.getElementById('inp-daysForward').value.trim();

  if (!daysBack || !daysForward || isNaN(daysBack) || isNaN(daysForward)) {
    showToast('Введите корректные числа', 'error');
    return;
  }

  try {
    const discountVal = parseInt(document.getElementById('inp-discount').value) || 42;
    const resp = await fetch(WEBAPP_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'setParams',
        salesDaysBack: Number(daysBack),
        salesDaysForward: Number(daysForward),
        discount: discountVal
      }),
      redirect: 'follow'
    });

    let result;
    try { result = await resp.json(); } catch(e) { result = null; }

    if (result && result.ok) {
      params.salesDaysBack = result.params.salesDaysBack;
      params.salesDaysForward = result.params.salesDaysForward;
      if (result.params.discount !== undefined) {
        discount = result.params.discount;
        params.discount = discount;
      }
    }
  } catch (err) {
    console.error('Params error:', err);
    showToast('Ошибка сохранения параметров', 'error');
  }
}

async function saveWarehouses() {
  const items = document.querySelectorAll('.wh-item');
  const changes = [];
  items.forEach(el => {
    changes.push({
      row: parseInt(el.dataset.row),
      active: el.classList.contains('active')
    });
  });

  try {
    const resp = await fetch(WEBAPP_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'setWarehouses', warehouses: changes }),
      redirect: 'follow'
    });

    let result;
    try { result = await resp.json(); } catch(e) { result = null; }

    if (result && result.ok) {
      params.allWarehouses = result.warehouses;
      params.warehouses = result.warehouses.filter(w => w.active).map(w => w.name);
      updateSummary();
      showToast('Склады обновлены', 'success');
    } else {
      showToast('Склады отправлены', 'success');
    }
  } catch (err) {
    console.error('Warehouses error:', err);
    showToast('Ошибка сохранения складов', 'error');
  }
}

// Серверный пересчёт заявки (одна операция)
async function doServerRecalc(btn, days) {
  document.getElementById('inp-daysBack').value = days;
  updateDateHints();
  btn.textContent = 'Пересчёт (дней: ' + days + ')...';
  await applyParams();
  await saveWarehouses();
  try {
    const resp = await fetch(WEBAPP_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'recalculate' }),
      redirect: 'follow'
    });
    try { await resp.json(); } catch(e) {}
  } catch(e) {}
  await loadData();
  return allData.filter(r => r.order > 0).reduce((s, r) => s + (r.volume || 0), 0);
}

async function recalculate() {
  const btn = document.getElementById('recalcBtn');
  btn.classList.add('saving');

  const targetVol = parseFloat(document.getElementById('inp-targetVolume').value) || 0;
  const currentVol = allData.filter(r => r.order > 0).reduce((s, r) => s + (r.volume || 0), 0);
  const currentDaysBack = parseInt(document.getElementById('inp-daysBack').value) || 175;

  if (targetVol > 0 && currentVol > 0) {
    // Метод секущих: используем реальные серверные данные
    // Точка 1: уже известна (currentDaysBack, currentVol)
    const d1 = currentDaysBack;
    const v1 = currentVol;

    // Точка 2: пропорциональная оценка
    // Формула заказа: order = CEILING(MAX(0, продажи + мин_ост - остаток), кратность)
    // Продажи ∝ дни → связь прямая: больше дней = больше объём
    let d2 = Math.round(d1 * targetVol / v1);
    d2 = Math.max(7, Math.min(730, d2));
    // Минимальный шаг чтобы получить другую точку
    if (d2 === d1) d2 = targetVol < v1 ? Math.max(7, d1 - 10) : Math.min(730, d1 + 10);

    const v2 = await doServerRecalc(btn, d2);

    // Проверяем: достаточно ли точно?
    if (v2 > 0 && Math.abs(v2 - targetVol) / targetVol <= 0.05) {
      showToast('Объём ' + v2.toFixed(1) + ' м³ (цель ' + targetVol + ', дней: ' + d2 + ')', 'success');
    } else if (v2 > 0 && Math.abs(v2 - v1) > 0.5) {
      // Метод секущих: интерполяция по двум реальным точкам
      // d3 = d1 + (target - v1) * (d2 - d1) / (v2 - v1)
      let d3 = Math.round(d1 + (targetVol - v1) * (d2 - d1) / (v2 - v1));
      d3 = Math.max(7, Math.min(730, d3));

      btn.textContent = 'Уточнение (дней: ' + d3 + ')...';
      const v3 = await doServerRecalc(btn, d3);
      showToast('Объём ' + v3.toFixed(1) + ' м³ (цель ' + targetVol + ', дней: ' + d3 + ')', 'success');
    } else {
      // Кривая слишком плоская — объём слабо зависит от дней
      showToast('Объём ' + v2.toFixed(1) + ' м³ — слабо зависит от дней', 'success');
    }
  } else {
    // Normal recalculation without volume targeting
    btn.textContent = 'Пересчёт...';
    await applyParams();
    await saveWarehouses();

    try {
      const resp = await fetch(WEBAPP_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'recalculate' }),
        redirect: 'follow'
      });
      let result;
      try { result = await resp.json(); } catch(e) { result = null; }
      if (result && result.ok) {
        showToast('Заявка пересчитана! Загружаю...', 'success');
      } else {
        showToast('Запрос отправлен, загружаю...', 'success');
      }
    } catch (err) {
      console.error('Recalc error:', err);
      showToast('Ошибка пересчёта', 'error');
    }

    await loadData();
  }

  btn.classList.remove('saving');
  btn.textContent = 'Пересчитать заявку';
  document.getElementById('inp-targetVolume').value = '';
}

async function recalcPeaks() {
  const btn = document.getElementById('recalcPeaksBtn');
  const peakDays = parseInt(document.getElementById('inp-peakDays').value) || 14;
  const peakDateFrom = document.getElementById('inp-peakDateFrom').value || '';
  btn.classList.add('saving');
  btn.textContent = 'Пересчёт пиков...';

  try {
    const resp = await fetch(WEBAPP_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'recalcPeaks', peakDays: peakDays, peakDateFrom: peakDateFrom }),
      redirect: 'follow'
    });

    let result;
    try { result = await resp.json(); } catch(e) { result = null; }

    if (result && result.ok) {
      showToast('Пики пересчитаны! Загружаю...', 'success');
    } else {
      showToast('Ошибка: ' + (result && result.error || 'нет ответа'), 'error');
    }
  } catch (err) {
    console.error('Recalc peaks error:', err);
    showToast('Ошибка пересчёта пиков', 'error');
  }

  btn.classList.remove('saving');
  btn.textContent = 'Пересчитать пики (~2-3 мин)';
  await loadData();
}
